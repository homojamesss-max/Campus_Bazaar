<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPUS BAZAAR | LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { --accent: #3b82f6; --bg: #0b0f1a; --card: #161b2a; }

        body { 
            background-color: var(--bg); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .glass-nav { background: rgba(11, 15, 26, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { border-color: rgba(59, 130, 246, 0.4); transform: translateY(-4px); }
        
        .search-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        .search-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-action {
            background: var(--accent);
            color: white;
            font-weight: 700;
            transition: all 0.2s;
            border-radius: 12px;
        }
        .btn-action:hover { opacity: 0.9; transform: scale(1.02); }

        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }
        
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        .modal-blur { backdrop-filter: blur(8px); background: rgba(2, 6, 23, 0.85); }
    </style>
</head>
<body onload="initApp()">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#0b0f1a] flex items-center justify-center p-6 hidden">
        <div class="card p-10 rounded-[2.5rem] max-w-md w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <i class="fa fa-graduation-cap text-2xl text-white"></i>
            </div>
            <div id="auth-form-content"></div>
        </div>
    </div>

    <nav id="main-nav" class="glass-nav px-4 md:px-8 py-4 sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
            
            <div class="flex items-center gap-3 cursor-pointer" onclick="renderHome()">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fa fa-shop text-white text-sm"></i>
                </div>
                <span class="font-extrabold text-lg tracking-tighter text-white">CAMPUS<span class="text-blue-500">BAZAAR</span></span>
            </div>

            <div class="order-3 md:order-2 w-full md:w-auto md:flex-1 max-w-lg">
                <div class="search-wrapper flex items-center px-4 py-2.5">
                    <i class="fa fa-search text-gray-500 text-sm mr-3"></i>
                    <input type="text" id="globalSearch" oninput="handleSearch()" placeholder="Find books, gadgets, or food..." class="bg-transparent border-none outline-none text-sm w-full text-white placeholder-gray-600">
                </div>
            </div>

            <div class="order-2 md:order-3 flex items-center gap-4">
                <div class="hidden sm:block text-right">
                    <p id="user-display" class="text-xs font-bold text-white"></p>
                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Active Member</p>
                </div>
                <button onclick="logout()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition">
                    <i class="fa fa-arrow-right-from-bracket text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-7xl mx-auto p-4 md:p-8 min-h-screen"></main>

    <div id="modal" class="fixed inset-0 modal-blur hidden items-center justify-center z-[100] p-4" onclick="if(event.target === this) closeModal()">
        <div class="card p-8 rounded-[2rem] max-w-lg w-full relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-gray-500 hover:text-white transition text-2xl">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        // Paste your configuration here from the Firebase Console
      const firebaseConfig = {
            apiKey: "AIzaSyD_tgOiJXN6ITjRgBQEWfA2CtRKmeWV0OQ",
            authDomain: "bazaar-d968d.firebaseapp.com",
            projectId: "bazaar-d968d",
            storageBucket: "bazaar-d968d.firebasestorage.app",
            messagingSenderId: "343357933548",
            appId: "1:343357933548:web:45ce015197d1e48a83e2c9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = JSON.parse(sessionStorage.getItem('cb_session')) || null;
        let searchQuery = "";

        // --- CORE APP LOGIC ---
        function initApp() {
            if (!currentUser) showLogin();
            else {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('user-display').innerText = currentUser.username.toUpperCase();
                renderHome();
            }
        }

        function handleSearch() {
            searchQuery = document.getElementById('globalSearch').value.toLowerCase();
            if (currentUser.role === 'buyer') renderBuyerShop();
        }

        // --- AUTH (STAYING LOCAL FOR NOW, OR LINK TO DB LATER) ---
        function showLogin() {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('auth-form-content').innerHTML = `
                <h2 class="text-2xl font-bold mb-1">Student Login</h2>
                <p class="text-gray-500 text-xs mb-8 font-medium">Enter your campus trade credentials</p>
                <div class="space-y-3 text-left">
                    <input type="text" id="loginUser" placeholder="Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-white">
                    <input type="password" id="loginPass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-white">
                    <button onclick="handleLogin()" class="w-full btn-action py-4 mt-2">ACCESS BAZAAR</button>
                    <p class="text-center text-[11px] text-gray-500 mt-4">Need an account? <span onclick="showRegister()" class="text-blue-500 cursor-pointer font-bold">Register</span></p>
                </div>`;
        }

        function showRegister() {
            document.getElementById('auth-form-content').innerHTML = `
                <h2 class="text-2xl font-bold mb-1">Join the Hub</h2>
                <p class="text-gray-500 text-xs mb-8 font-medium">Choose your role to get started</p>
                <div class="space-y-3 text-left">
                    <input type="text" id="regUser" placeholder="Choose Username" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-white">
                    <input type="password" id="regPass" placeholder="Choose Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-white">
                    <select id="regRole" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-gray-400">
                        <option value="buyer">I want to Buy</option>
                        <option value="seller">I want to Sell</option>
                    </select>
                    <button onclick="handleRegister()" class="w-full btn-action py-4 mt-2">CREATE ACCOUNT</button>
                    <p class="text-center text-[11px] text-gray-500 mt-4">Have an account? <span onclick="showLogin()" class="text-blue-500 cursor-pointer font-bold">Sign In</span></p>
                </div>`;
        }

        async function handleLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            const snapshot = await db.collection('users').where('username', '==', u).where('password', '==', p).get();
            
            if(!snapshot.empty) {
                const user = snapshot.docs[0].data();
                sessionStorage.setItem('cb_session', JSON.stringify(user));
                location.reload();
            } else alert("Invalid credentials.");
        }

        async function handleRegister() {
            const u = document.getElementById('regUser').value, p = document.getElementById('regPass').value, r = document.getElementById('regRole').value;
            if(!u || !p) return alert("All fields required.");
            
            await db.collection('users').add({ username: u, password: p, role: r });
            alert("Registration successful!");
            showLogin();
        }

        function logout() { sessionStorage.removeItem('cb_session'); location.reload(); }
        function renderHome() { currentUser.role === 'buyer' ? renderBuyerShop() : renderSellerHub(); }

        // --- BUYER (LIVE FEED) ---
        async function renderBuyerShop() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-extrabold tracking-tight">Marketplace</h1>
                        <p class="text-[11px] text-blue-500 font-bold uppercase tracking-widest">Live Campus Feed</p>
                    </div>
                    <div class="flex bg-white/5 p-1 rounded-xl">
                        <button onclick="renderBuyerOrders()" class="px-4 py-2 text-[10px] font-bold uppercase tracking-wider text-gray-400 hover:text-white transition">Orders</button>
                        <button onclick="renderBuyerHistory()" class="px-4 py-2 text-[10px] font-bold uppercase tracking-wider text-gray-400 hover:text-white transition">History</button>
                    </div>
                </div>
                <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                    <p class="col-span-full text-center py-10 text-gray-500">Loading products...</p>
                </div>`;
            
            const snapshot = await db.collection('products').get();
            let products = [];
            snapshot.forEach(doc => products.push({id: doc.id, ...doc.data()}));
            
            const filtered = products.filter(p => p.name.toLowerCase().includes(searchQuery) || p.seller.toLowerCase().includes(searchQuery));

            document.getElementById('products-grid').innerHTML = filtered.map(p => `
                <div class="card p-3 rounded-[1.5rem] flex flex-col group">
                    <div class="relative overflow-hidden rounded-[1rem] aspect-square mb-3">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 bg-white/5">
                        ${p.stock < 5 && p.stock > 0 ? `<div class="absolute bottom-2 left-2 bg-orange-500 text-[9px] font-black px-2 py-1 rounded-md text-white">LOW STOCK</div>` : ''}
                    </div>
                    <div class="px-1 flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-sm truncate pr-2 text-white/90">${p.name}</h3>
                            <span class="text-blue-500 font-bold text-sm">₱${p.price}</span>
                        </div>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter mb-4">Seller: ${p.seller}</p>
                    </div>
                    <button onclick="openCheckout('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="w-full py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${p.stock > 0 ? 'bg-white/5 hover:bg-blue-600 text-white' : 'bg-red-500/10 text-red-500 opacity-50'}">
                        ${p.stock > 0 ? 'Buy Now' : 'Sold Out'}
                    </button>
                </div>`).join('') || `<p class="col-span-full text-center py-20 text-gray-500">No items found.</p>`;
        }

        async function openCheckout(id) {
            const doc = await db.collection('products').doc(id).get();
            const p = doc.data();
            p.id = id;

            document.getElementById('modal-body').innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <img src="${p.img}" class="w-20 h-20 rounded-2xl object-cover bg-white/5">
                    <div>
                        <h2 class="text-xl font-bold text-white uppercase leading-tight">${p.name}</h2>
                        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Available: ${p.stock} Units</p>
                    </div>
                </div>
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <label class="text-[9px] text-gray-500 uppercase font-black mb-1 block">Quantity</label>
                            <input type="number" id="buyQty" value="1" min="1" max="${p.stock}" oninput="updateTotal(${p.price}, ${p.stock})" class="bg-transparent border-none outline-none w-full text-lg font-bold text-white">
                        </div>
                        <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
                            <label class="text-[9px] text-blue-500 uppercase font-black mb-1 block">Total Due</label>
                            <div id="totalDisplay" class="text-lg font-black text-white">₱${p.price}</div>
                        </div>
                    </div>
                    <input type="text" id="checkoutLoc" placeholder="Meetup Location" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-white">
                    <select id="payMethod" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition text-sm text-gray-400">
                        <option value="Cash">Cash on Delivery</option>
                        <option value="GCash">GCash</option>
                    </select>
                    <button onclick="confirmPurchase('${p.id}')" class="w-full btn-action py-4 mt-4 uppercase tracking-widest text-[11px]">Secure Order</button>
                </div>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function updateTotal(price, max) {
            let qty = document.getElementById('buyQty').value;
            if (qty > max) qty = max;
            document.getElementById('totalDisplay').innerText = `₱${(qty * price).toLocaleString()}`;
        }

        async function confirmPurchase(productId) {
            const qty = parseInt(document.getElementById('buyQty').value);
            const loc = document.getElementById('checkoutLoc').value;
            if(!loc) return alert("Location required.");

            const docRef = db.collection('products').doc(productId);
            const pDoc = await docRef.get();
            const p = pDoc.data();

            await db.collection('orders').add({
                productId: productId, itemName: p.name, itemImg: p.img,
                price: p.price, quantity: qty, total: p.price * qty,
                seller: p.seller, buyer: currentUser.username,
                location: loc, status: 'Pending', date: new Date().toLocaleDateString()
            });

            await docRef.update({ stock: p.stock - qty });
            closeModal(); renderBuyerOrders();
        }

        async function renderBuyerOrders() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<button onclick="renderBuyerShop()" class="mb-4 text-blue-500"><i class="fa fa-arrow-left"></i> Back</button><h2 class="text-xl font-bold mb-4">Pending Orders</h2><div id="order-list" class="space-y-3"></div>`;
            
            const snapshot = await db.collection('orders').where('buyer', '==', currentUser.username).get();
            const list = document.getElementById('order-list');
            
            snapshot.forEach(doc => {
                const o = doc.data();
                list.innerHTML += `<div class="card p-4 rounded-2xl flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="${o.itemImg}" class="w-12 h-12 rounded-xl object-cover">
                        <div><p class="font-bold text-white">${o.itemName} (x${o.quantity})</p><p class="text-xs text-gray-500">${o.status}</p></div>
                    </div>
                </div>`;
            });
        }

        // --- SELLER (LIVE HUB) ---
        async function renderSellerHub() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h1 class="text-2xl font-bold">Seller Hub</h1>
                        <p class="text-[11px] text-blue-500 font-bold uppercase tracking-widest">Store Management</p>
                    </div>
                    <button onclick="openCreateForm()" class="btn-action px-6 py-2.5 text-[11px] tracking-widest uppercase">List Item</button>
                </div>
                <div id="seller-grid" class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2"><h3 class="mb-4 text-gray-500 uppercase text-[10px] font-black">Active Requests</h3><div id="requests" class="space-y-3"></div></div>
                    <div><h3 class="mb-4 text-gray-500 uppercase text-[10px] font-black">My Inventory</h3><div id="inventory" class="card rounded-2xl divide-y divide-white/5"></div></div>
                </div>`;

            // Load Inventory
            const invSnap = await db.collection('products').where('seller', '==', currentUser.username).get();
            invSnap.forEach(doc => {
                const p = doc.data();
                document.getElementById('inventory').innerHTML += `<div class="p-4 flex justify-between"><span>${p.name}</span><span class="text-blue-500">₱${p.price}</span></div>`;
            });

            // Load Requests
            const orderSnap = await db.collection('orders').where('seller', '==', currentUser.username).get();
            orderSnap.forEach(doc => {
                const o = doc.data();
                document.getElementById('requests').innerHTML += `<div class="card p-4 rounded-2xl flex justify-between items-center">
                    <div><p class="font-bold">${o.itemName}</p><p class="text-xs text-gray-500">By ${o.buyer} @ ${o.location}</p></div>
                    <button onclick="shipOrder('${doc.id}')" class="text-orange-500 text-xs font-bold uppercase">${o.status === 'Pending' ? 'Ship Item' : 'Shipped'}</button>
                </div>`;
            });
        }

        async function shipOrder(id) {
            await db.collection('orders').doc(id).update({ status: 'On the Way' });
            renderSellerHub();
        }

        function openCreateForm() {
            document.getElementById('modal-body').innerHTML = `
                <h2 class="text-xl font-bold mb-6 uppercase">New Listing</h2>
                <div class="space-y-4">
                    <input type="text" id="newName" placeholder="Product Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="newPrice" placeholder="Price (₱)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none">
                        <input type="number" id="newStock" placeholder="Stock" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-white outline-none">
                    </div>
                    <input type="file" id="newImg" accept="image/*" class="text-xs text-gray-400">
                    <button onclick="processProduct()" class="w-full btn-action py-4 uppercase text-xs">Post to Bazaar</button>
                </div>`;
            document.getElementById('modal').style.display = 'flex';
        }

        async function processProduct() {
            const n = document.getElementById('newName').value, p = document.getElementById('newPrice').value, s = document.getElementById('newStock').value, f = document.getElementById('newImg').files[0];
            if(!n || !f) return alert("Missing fields");

            const r = new FileReader();
            r.onload = async (e) => {
                await db.collection('products').add({
                    name: n, price: parseFloat(p), stock: parseInt(s),
                    img: e.target.result, seller: currentUser.username
                });
                closeModal(); renderSellerHub();
            };
            r.readAsDataURL(f);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
