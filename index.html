<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPUS BAZAAR | HISTORY RESTORED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --accent: #3b82f6; --bg: #0b0f1a; --card: #161b2a; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-nav { background: rgba(11, 15, 26, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .btn-action { background: var(--accent); color: white; font-weight: 700; border-radius: 12px; transition: 0.2s; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body onload="initApp()">

    <nav id="main-nav" class="glass-nav px-4 md:px-8 py-4 sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 cursor-pointer" onclick="renderHome()">
                <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center"><i class="fa fa-shop text-white"></i></div>
                <span class="font-extrabold text-lg text-white">CAMPUS<span class="text-blue-500">BAZAAR</span></span>
            </div>
            <button onclick="logout()" class="text-red-500 bg-red-500/10 w-9 h-9 rounded-xl"><i class="fa fa-power-off"></i></button>
        </div>
    </nav>

    <main id="main-content" class="max-w-7xl mx-auto p-6 min-h-screen"></main>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyD_tgOiJXN6ITjRgBQEWfA2CtRKmeWV0OQ",
            authDomain: "bazaar-d968d.firebaseapp.com",
            projectId: "bazaar-d968d",
            storageBucket: "bazaar-d968d.firebasestorage.app",
            messagingSenderId: "343357933548",
            appId: "1:343357933548:web:45ce015197d1e48a83e2c9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = JSON.parse(sessionStorage.getItem('cb_session')) || null;

        function initApp() {
            if (!currentUser) { /* Auth logic here */ } 
            else {
                document.getElementById('main-nav').classList.remove('hidden');
                renderHome();
            }
        }

        function renderHome() { currentUser.role === 'buyer' ? renderBuyerShop() : renderSellerHub(); }

        // --- BUYER HISTORY & RECEIVE ---
        async function renderBuyerOrders() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="renderBuyerShop()" class="text-blue-500"><i class="fa fa-arrow-left"></i></button>
                    <h2 class="font-bold">Active Orders</h2>
                </div>
                <div id="order-list" class="space-y-3"></div>
                <button onclick="renderBuyerHistory()" class="mt-8 text-[10px] font-bold text-gray-500 uppercase tracking-widest hover:text-white transition">View Purchase Archive</button>`;
            
            const snap = await db.collection('orders').where('buyer', '==', currentUser.username).get();
            const list = document.getElementById('order-list');

            if (snap.empty) list.innerHTML = `<p class="text-gray-600 text-sm">No current orders.</p>`;

            snap.forEach(doc => {
                const o = doc.data();
                list.innerHTML += `
                    <div class="card p-4 rounded-xl flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img src="${o.itemImg}" class="w-10 h-10 rounded-lg object-cover">
                            <div><p class="text-sm font-bold text-white">${o.itemName}</p><p class="text-[10px] text-blue-500 uppercase">${o.status}</p></div>
                        </div>
                        ${o.status === 'On the Way' ? 
                            `<button onclick="confirmReceived('${doc.id}')" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Receive</button>` : 
                            `<span class="text-[10px] font-bold text-gray-500 uppercase">Awaiting Shipping</span>`
                        }
                    </div>`;
            });
        }

        async function confirmReceived(orderId) {
            const docRef = db.collection('orders').doc(orderId);
            const snap = await docRef.get();
            const orderData = snap.data();

            // Move to History Collection
            await db.collection('history').add({
                ...orderData,
                status: 'Completed',
                completedAt: new Date().toLocaleDateString()
            });

            // Delete from active orders
            await docRef.delete();
            alert("Order completed! Moved to History.");
            renderBuyerOrders();
        }

        async function renderBuyerHistory() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="renderBuyerOrders()" class="text-blue-500"><i class="fa fa-arrow-left"></i></button>
                    <h2 class="font-bold">Purchase Archive</h2>
                </div>
                <div id="history-list" class="grid md:grid-cols-2 gap-4"></div>`;
            
            const snap = await db.collection('history').where('buyer', '==', currentUser.username).get();
            const list = document.getElementById('history-list');

            snap.forEach(doc => {
                const h = doc.data();
                list.innerHTML += `
                    <div class="card p-5 rounded-2xl border-l-4 border-emerald-500">
                        <div class="flex justify-between items-center">
                            <div><p class="font-bold text-sm text-white">${h.itemName}</p><p class="text-[9px] text-gray-500 font-bold uppercase">Closed ${h.completedAt}</p></div>
                            <p class="text-emerald-500 font-black">₱${h.total}</p>
                        </div>
                    </div>`;
            });
        }

        // --- SELLER REVENUE & HISTORY ---
        async function renderSellerHub() {
            // ... (Your existing Seller Hub UI code here) ...
            // Add this button to the Seller Hub UI to view revenue:
            // <button onclick="renderSalesHistory()" class="text-[10px] text-blue-500 font-bold uppercase">View Revenue Report</button>
        }

        async function renderSalesHistory() {
            const container = document.getElementById('main-content');
            const snap = await db.collection('history').where('seller', '==', currentUser.username).get();
            
            let totalRevenue = 0;
            let salesHtml = "";

            snap.forEach(doc => {
                const h = doc.data();
                totalRevenue += h.total;
                salesHtml += `
                    <div class="card p-4 rounded-xl flex justify-between items-center">
                        <div><p class="font-bold text-sm text-white uppercase">${h.itemName} (x${h.quantity})</p>
                        <p class="text-[9px] text-gray-500 font-bold uppercase">To ${h.buyer} on ${h.completedAt}</p></div>
                        <p class="font-bold text-emerald-500">+₱${h.total}</p>
                    </div>`;
            });

            container.innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderSellerHub()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5"><i class="fa fa-arrow-left"></i></button>
                    <h2 class="text-xl font-bold uppercase">Revenue Report</h2>
                </div>
                <div class="card p-8 rounded-[2rem] mb-8 bg-emerald-500/5 border-emerald-500/10 text-center">
                    <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-1">Total Lifetime Earnings</p>
                    <p class="text-4xl font-extrabold text-emerald-500 tracking-tighter">₱${totalRevenue.toLocaleString()}</p>
                </div>
                <div class="space-y-3">${salesHtml || '<p class="text-gray-500 text-center">No sales yet.</p>'}</div>`;
        }
        
        // ... (Rest of your helper functions: renderBuyerShop, logout, etc.) ...
    </script>
</body>
</html>
